<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Counter-Battery Command Net</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="terminal-shell">
      <header class="terminal-header">
        <div>
          <p class="eyebrow">Fire Direction Center</p>
          <h1>Counter-Battery Net</h1>
          <nav class="site-nav" aria-label="Scenario navigation">
            <a href="index.html" aria-current="page">Counter-Battery</a>
            <a href="anti-air.html">Anti-Air</a>
          </nav>
        </div>
        <button id="newGameButton" type="button">New Mission</button>
      </header>

      <section class="status-bar" aria-live="polite">
        <p><span>Objective</span><strong id="objectiveValue">100%</strong></p>
        <p><span>HE</span><strong id="ammoHe">18</strong></p>
        <p><span>Smoke</span><strong id="ammoSmoke">4</strong></p>
        <p><span>Illum</span><strong id="ammoIllumination">4</strong></p>
        <p><span>Wind</span><strong id="windValue">E / Light</strong></p>
        <p><span>Enemy</span><strong id="enemyStatusValue">Hidden</strong></p>
        <p><span>Timer</span><strong id="timerValue">Ready</strong></p>
      </section>

      <section class="counter-layout">
        <aside class="artillery-panel" aria-label="Artillery fire visualization">
          <h2>Battery / Trajectory</h2>
          <svg id="artilleryScope" viewBox="0 0 220 150" role="img" aria-label="Artillery battery and shell arc">
            <line class="ground-line" x1="12" y1="130" x2="208" y2="130"></line>
            <g class="battery-graphic" aria-label="Artillery battery">
              <rect x="24" y="114" width="42" height="10"></rect>
              <circle cx="34" cy="128" r="6"></circle>
              <circle cx="56" cy="128" r="6"></circle>
              <line x1="58" y1="114" x2="91" y2="98"></line>
              <line x1="59" y1="118" x2="93" y2="102"></line>
              <rect x="26" y="104" width="28" height="12"></rect>
            </g>
            <path id="arcPath" class="arc-path" d="M 82 102 Q 112 12 182 112"></path>
            <path id="arcProgress" class="arc-progress" d="M 82 102 Q 112 12 182 112"></path>
            <circle id="shellMarker" class="shell-marker" cx="82" cy="102" r="3"></circle>
            <line class="splash-marker" x1="177" y1="113" x2="187" y2="123"></line>
            <line class="splash-marker" x1="187" y1="113" x2="177" y2="123"></line>
            <text x="44" y="96">BATTERY</text>
            <text id="arcLabel" x="110" y="145">READY</text>
          </svg>
          <p id="arcReadout" class="arc-readout">No fire mission active.</p>
        </aside>

        <section
          id="chatLog"
          class="chat-log"
          aria-live="polite"
          aria-label="Command chat log"
        ></section>
      </section>

      <form id="commandForm" class="command-form">
        <label for="commandInput">Command</label>
        <div class="command-row">
          <input
            id="commandInput"
            autocomplete="off"
            spellcheck="false"
            placeholder="Type: fire 045 8.5 he, scan, intel, status, or help"
          />
          <button id="sendButton" type="submit">Send</button>
        </div>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
